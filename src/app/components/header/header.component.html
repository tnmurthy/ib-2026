<header class="header">
  <div class="container">
    <div class="header-content">
      <a routerLink="/" class="logo">
        <img src="/assets/IB-logo.jpg" alt="Innovat Bharat Logo" class="logo-image">
        <span class="logo-text">Innovat Bharat</span>
      </a>

      <button class="mobile-menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" [class.active]="isMenuOpen">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
        <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
        <a routerLink="/ecosystem" routerLinkActive="active" (click)="closeMenu()">Ecosystem</a>
        <a routerLink="/programs" routerLinkActive="active" (click)="closeMenu()">Programs</a>
        <a routerLink="/for-colleges" routerLinkActive="active" (click)="closeMenu()">For Colleges</a>
        <a routerLink="/partners-mentors" routerLinkActive="active" (click)="closeMenu()">Partners</a>
        <a routerLink="/contact" class="btn-primary" (click)="closeMenu()">Invite Us</a>
      </nav>
    </div>
  </div>
</header>
