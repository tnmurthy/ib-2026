<div class="home-modular">
  <!-- Top Navigation Tabs (Sticky) -->
  <app-pill-tabs [tabs]="tabs" [activeTabId]="activeTabId" (tabChange)="onTabChange($event)"></app-pill-tabs>

  <div class="content-wrapper">
    
    <!-- SECTION 1: HOW IT WORKS -->
    <div id="how-it-works" class="tab-section">
      <app-hero-block 
        title="Bridging the Gap Between Education and Industry" 
        subtitle="Transforming rural and tier-3 engineering colleges into ecosystems of innovation."
        background="gradient"
      ></app-hero-block>
      
      <div class="container py-5">
        <app-step-flow [steps]="howItWorksSteps"></app-step-flow>
      </div>

      <app-cta-block 
        title="Invite Us To Your College" 
        value="Join the ecosystem transformation today."
        primaryText="Schedule Introduction"
        primaryLink="/contact"
      ></app-cta-block>
    </div>

    <!-- SECTION 2: SOLUTIONS -->
    <div id="solutions" class="tab-section">
      <app-hero-block 
        title="Why Tier-3 College Students Struggle" 
        subtitle="We address the disconnect between degrees and industry expectations."
        align="center"
      ></app-hero-block>

      <div class="container py-4">
        <app-card-grid [cards]="solutionCards" [columns]="2" cardStyle="accent"></app-card-grid>
      </div>

      <app-cta-block 
        title="Ready to See It in Action?" 
        value="Discover how our pillars transform campuses."
        primaryText="Explore Ecosystem"
        primaryLink="/ecosystem"
        variant="dark"
      ></app-cta-block>
    </div>

    <!-- SECTION 3: OUR METHOD -->
    <div id="method" class="tab-section">
      <app-hero-block 
        title="The AMLA Model: Our Core Philosophy" 
        subtitle="The conceptual framework that drives our impact."
        align="center"
        background="light"
      ></app-hero-block>

      <div class="container py-4">
        <app-amla-flow></app-amla-flow>
      </div>

      <div class="container text-center mb-5">
        <div class="tagline highlight-container">
          <span class="highlight">Right direction.</span>
          <span class="highlight">Right mentorship.</span>
          <span class="highlight">Real exposure.</span>
        </div>
      </div>

      <app-cta-block 
        title="Get a Strategy Demo" 
        value="Learn how the AMLA model applies to your institution."
        primaryText="Book Demo Call"
        variant="emphasized"
      ></app-cta-block>
    </div>

    <!-- SECTION 4: STRATEGY & DATA -->
    <div id="strategy" class="tab-section">
      <app-hero-block 
        title="Our Focus: Three Pillars of Data" 
        subtitle="Focusing on sustainable startups, government schemes, and society-linked problems."
        align="left"
      ></app-hero-block>

      <div class="container py-4">
        <app-vertical-pillars 
          leftTitle="Strategy & Framework"
          leftDescription="We prioritize successful 'Made in India' models and problem statements with business opportunities."
          rightContentTitle="Educational Strategy"
          rightContentDescription="Focusing on traits like resourcefulness and risk-taking through real-world stories."
        >
          <div leftSide>
            <app-card-grid [cards]="dataPillars" [columns]="1" cardStyle="outline"></app-card-grid>
          </div>
          <div rightSide class="strategy-vibe">
            <div class="story-badges">
              <span>Ambani</span>
              <span>Steve Jobs</span>
              <span>Blinkit</span>
            </div>
            <p class="mt-3 text-muted italic small">"Bits and pieces of stories that inspire real action."</p>
          </div>
        </app-vertical-pillars>
      </div>
    </div>

    <!-- SECTION 5: WHO IT’S FOR -->
    <div id="who-for" class="tab-section">
      <app-hero-block 
        title="Who Benefit's? Creating Impact at Every Level" 
        subtitle="From students to society, our mission builds a stronger nation."
        align="center"
      ></app-hero-block>

      <div class="container py-4">
        <app-card-grid [cards]="personaCards" [columns]="3" cardStyle="default"></app-card-grid>
      </div>

      <app-cta-block 
        title="Ready to Build the Nation?" 
        value="Connect with us to start your journey."
        primaryText="Book Call (BIG)"
        primaryLink="/contact"
        variant="emphasized"
      ></app-cta-block>
    </div>

  </div>

  <!-- Sticky Bottom CTA for Mobile -->
  <div class="mobile-sticky-cta d-md-none">
    <a routerLink="/contact" class="btn btn-primary w-100">Get Strategy Call</a>
  </div>
</div>
